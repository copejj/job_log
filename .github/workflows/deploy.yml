on:
    release:
        types: [published]
    workflow_dispatch: 
        inputs:
            test_tag:
                description: 'Tag to use for testing (e.g. v1.0.0-test)'
                required: false
                default: 'testing'

jobs:
    deploy-to-production:
        runs-on: ubuntu-latest
        steps:
            -   name: Execute Remote Deployment
                uses: appleboy/ssh-action@v1.2.0
                with:
                    host: ${{ vars.PROD_HOST }}
                    port: ${{ secrets.SSH_PRIVATE_PORT }}
                    username: ${{ secrets.SSH_PRIVATE_USERNAME }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    # IMPORTANT: All variables used in the script must be listed here
                    envs: TAG_NAME
                    script: |
                        # 1. Initialization and Output
                        echo "[Step 1/4] Starting Deployment for $TAG_NAME"
                        cd ${{ vars.PROD_APP_PATH }}

                        # 2. Sync Code
                        echo "[Step 2/4] Fetching code for tag: $TAG_NAME"
                        git fetch --tags --all
                        git checkout "$TAG_NAME"

                        # 3. Make database changes (might implement later but probably not)
                        echo "[Step 3/4] Potential future database change migration"

                        # 4. Final Cleanup
                        echo "[Step 4/4] Cleaning up environment..."
                        git checkout .

                        echo "--- Deployment of $TAG_NAME completed successfully! ---"
                env:
                    TAG_NAME: ${{ github.event.inputs.test_tag || github.event.release.tag_name }}
